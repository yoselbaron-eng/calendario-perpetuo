<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario Perpetuo</title>
    <style>
        /* Fondo oscuro */
        body { 
            background-color: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
        }
        /* Cuadro central claro */
        .contenedor { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h2 { color: #333; margin-bottom: 20px; }
        /* La casilla de entrada */
        input { 
            width: 100%; 
            padding: 12px; 
            font-size: 18px; 
            border: 2px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; /* Esto asegura que el padding no ensanche la casilla */
            text-align: center;
        }
        #resultado { 
            margin-top: 25px; 
            font-size: 20px; 
            font-weight: bold; 
            color: #007bff; 
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Día de la semana</h2>
        <p style="color: #666; font-size: 14px;">Formato: dd-mm-aaaa</p>
        
        <input type="text" id="fecha" placeholder="01-01-2024">
        
        <div id="resultado"></div>
    </div>

    <script>
        const inputFecha = document.getElementById('fecha');
        const divResultado = document.getElementById('resultado');
        const nombresDias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

        inputFecha.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const valor = inputFecha.value;
                const partes = valor.split('-');

                if (partes.length === 3) {
                    const d = parseInt(partes[0]);
                    const m = parseInt(partes[1]) - 1;
                    const a = parseInt(partes[2]);
                    
                    const fechaObj = new Date(a, m, d);

                    if (fechaObj.getFullYear() === a && fechaObj.getMonth() === m && fechaObj.getDate() === d) {
                        divResultado.innerText = "Es " + nombresDias[fechaObj.getDay()];
                        divResultado.style.color = "#28a745";
                    } else {
                        divResultado.innerText = "Fecha no válida";
                        divResultado.style.color = "#dc3545";
                    }
                } else {
                    divResultado.innerText = "Formato incorrecto";
                    divResultado.style.color = "#dc3545";
                }
            }
        });
    </script>

</body>
</html>
